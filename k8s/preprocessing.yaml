apiVersion: apps/v1
kind: Deployment
metadata:
  name: preprocessing-deployment
  namespace: projet-trigramme
  labels:
    app: preprocessing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: preprocessing
  template:
    metadata:
      labels:
        app: preprocessing
    spec:
      containers:
      - name: preprocessing-container
        image: issamehassane/ham10000-preprocessing:latest
        ports:
        - containerPort: 8001
        env:
          - name: INFERENCE_SERVICE_URL
            value: "http://inference-svc.projet-trigramme.svc.cluster.local:5001/predict"
          - name: MONITORING_URL
            value: "http://monitoring-svc.projet-trigramme.svc.cluster.local:9090/log"
        resources:
          requests:
            memory: "512Mi"
            cpu: "1000m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: preprocessing-svc
  namespace: projet-trigramme
spec:
  type: ClusterIP
  selector:
    app: preprocessing
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001