apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-deployment
  namespace: projet-trigramme
  labels:
    app: inference
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      containers:
      - name: inference-container
        image: issamehassane/ham10000-inference:latest
        ports:
        - containerPort: 5001
        resources:
          requests:
            memory: "2Gi"
            cpu: "1500m"
          limits:
            memory: "2Gi"
            cpu: "1500m"
---
apiVersion: v1
kind: Service
metadata:
  name: inference-svc
  namespace: projet-trigramme
spec:
  type: ClusterIP
  selector:
    app: inference
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001