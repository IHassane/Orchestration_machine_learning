services:
  preprocessing:
    build:
      context: ./services/preprocessing
    ports:
      - "8001:8001"
    environment:
      - INFERENCE_SERVICE_URL=http://inference:5001/predict
      - MONITORING_URL=http://monitoring:9090/log
    depends_on:
      - inference
      - monitoring

  inference:
    build:
      context: ./services/inference
    ports:
      - "5001:5001"
    volumes:
      - ./services/inference/models:/app/models 

  monitoring:
    build:
      context: ./services/monitoring
    ports:
      - "9090:9090"