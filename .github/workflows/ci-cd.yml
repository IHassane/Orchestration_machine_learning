name: CI/CD Pipeline HAM10000

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. ÉTAPE DE TEST ET COUVERTURE (CI)
  test-and-coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration de Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # <-- CORRIGÉ : C'était python-python
        cache: 'pip' 

    - name: Installation des dépendances globales et de test
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-mock httpx numpy Pillow fastapi torch python-multipart torchvision

    - name: Exécution des tests avec vérification des 80% de couverture
      env:
        PYTHONPATH: .
      run: |
        pytest --cov=services --cov-report=term-missing --cov-fail-under=80

  # 2. ÉTAPE DE BUILD ET PUSH SUR DOCKER HUB (CD)
  build-and-push:
    needs: test-and-coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    strategy:
      matrix:
        include:
          - service_name: preprocessing
            context: ./services/preprocessing
          - service_name: inference
            context: ./services/inference
          - service_name: monitoring
            context: ./services/monitoring

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    # --- ÉTAPE AJOUTÉE : Indispensable pour émuler l'ARM64 pendant le build sur GitHub ---
    - name: Configuration de QEMU (pour le multi-architecture)
      uses: docker/setup-qemu-action@v3

    - name: Connexion au Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Configuration de Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build et Push de l'image (Multi-Architecture)
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        push: true
        # --- MODIFICATION ICI : On demande explicitement AMD64 + ARM64 ---
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ham10000-${{ matrix.service_name }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ham10000-${{ matrix.service_name }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max