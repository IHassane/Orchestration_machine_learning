name: CI/CD Pipeline HAM10000

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. ÉTAPE DE TEST ET COUVERTURE (CI)
  test-and-coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration de Python 3.10
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'
        cache: 'pip' # Cache les dépendances pour accélérer les futurs runs

    - name: Installation des dépendances globales et de test
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pytest-mock httpx numpy Pillow fastapi
        # Si tu préfères installer via tes requirements locaux :
        # pip install -r services/preprocessing/requirements.txt
        # pip install -r services/monitoring/requirements.txt

    - name: Exécution des tests avec vérification des 80% de couverture
      run: |
        # --cov-fail-under=80 va faire planter le workflow si la couverture globale est inférieure à 80%
        pytest --cov=services --cov-report=term-missing --cov-fail-under=80

  # 2. ÉTAPE DE BUILD ET PUSH SUR DOCKER HUB (CD)
  # Ce job ne se lance QUE si le job 'test-and-coverage' a réussi (donc si couverture >= 80%)
  build-and-push:
    needs: test-and-coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Ne push que sur les commits de la branche main
    
    strategy:
      matrix:
        include:
          - service_name: preprocessing
            context: ./services/preprocessing
          - service_name: inference
            context: ./services/inference
          - service_name: monitoring
            context: ./services/monitoring

    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Connexion au Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Configuration de Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build et Push de l'image
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        push: true
        # Remplace 'ton-username-dockerhub' par ton vrai namespace Docker Hub
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/ham10000-${{ matrix.service_name }}:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/ham10000-${{ matrix.service_name }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max